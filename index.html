<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise ❤️</title>
    <link rel="stylesheet" href="Shrouk.css">
</head>
<body>

    <div class="backdrop"></div>

    <input type="checkbox" id="open-trigger">
    
    <label for="open-trigger" class="envelope-wrapper">
        <div class="flap"></div>
        <div class="envelope">
            <div class="side-flap-left"></div>
            <div class="side-flap-right"></div>
        </div>
        
        <div class="letter">
            <div class="letter-content">
                <h2>يا أغلى صدفة ❤️</h2>
                <p>
                    بصراحة، ملقيتش طريقة "Creative" تليق بيك <br>
                    أكتر من إني أصمم لك الصفحة دي بنفسي <br>
                    عشان أقولك.. إني بحبك جداً!
                </p>
            </div>
        </div>
    </label>

    <div class="bg-hearts">
        <span class="bg-heart" style="left: 10%; animation-delay: 0s;">❤️</span>
        <span class="bg-heart" style="left: 30%; animation-delay: 1s;">💖</span>
        <span class="bg-heart" style="left: 70%; animation-delay: 2s;">💗</span>
        <span class="bg-heart" style="left: 90%; animation-delay: 1.5s;">❤️</span>
    </div>

</body>
</html>
