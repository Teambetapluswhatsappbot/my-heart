<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Confession</title>
    <style>
        /* إعدادات عامة - ألوان ناعمة ومريحة */
        :root {
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #fde2e4 100%);
            --envelope-grad: linear-gradient(135deg, #ffb3c1 0%, #ffc4d0 100%);
            --flap-color: #ff99ac;
            --letter-paper: #fff;
            --heart-color: #ff4d6d;
            --text-color: #444;
            --shadow-soft: 0 10px 30px rgba(255, 179, 193, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            direction: rtl; /* عشان الكلام العربي */
        }

        /* الجلاس مورفيزم خلف الجواب */
        .backdrop {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        /* الحاوية الرئيسية للجواب */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            z-index: 1;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px); /* حركة خفيفة عند الوقوف عليه */
        }

        /* حالة الفتح: نفس فكرة الـ Checkbox في الـ CSS */
        #open-trigger {
            display: none;
        }

        /* جسم الجواب */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--envelope-grad);
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            z-index: 2;
            overflow: hidden; /* عشان المثلثات متطلعش بره */
        }

        /* غطاء الجواب (المثلث العلوي) */
        .flap {
            position: absolute;
            top: -1px;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid var(--flap-color);
            transform-origin: top;
            transition: transform 0.8s ease-in-out, z-index 0.3s;
            z-index: 5;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        /* تزيين الغطاء بقلب صغير */
        .flap::after {
            content: '❤️';
            position: absolute;
            top: -105px; /* مكان القلب على رأس المثلث */
            left: -12px;
            font-size: 24px;
            color: white;
            opacity: 1;
            transition: opacity 0.3s;
        }

        /* الورقة (الرسالة) */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 190px;
            background: var(--letter-paper);
            background-image: linear-gradient(rgba(240,240,240,.5) 1px, transparent 1px); /* سطور وهمية */
            background-size: 100% 25px;
            padding: 25px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.8s ease-in-out, bottom 0.8s ease-in-out;
            z-index: 3;
            text-align: center;
            opacity: 0; /* مخفية في البداية */
        }

        .letter-content h2 {
            font-size: 22px;
            color: var(--heart-color);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .letter-content p {
            font-size: 16px;
            color: var(--text-color);
            line-height: 1.6;
        }

        /* === الأكشن لما تضغط على الجواب === */
        
        /* 1. الغطاء يفتح للفوق */
        #open-trigger:checked + .envelope-wrapper .flap {
            transform: rotateX(180deg);
            z-index: 1; /* ينزل تحت الورقة بعد الفتح */
        }

        /* إخفاء قلب الغطاء عند الفتح */
        #open-trigger:checked + .envelope-wrapper .flap::after {
            opacity: 0;
        }

        /* 2. الورقة تطلع وتظهر */
        #open-trigger:checked + .envelope-wrapper .letter {
            transform: translateX(-50%) translateY(-140px);
            opacity: 1;
            bottom: 20px;
        }

        /* قلوب صغيرة بتطير في الخلفية أول ما يتفتح */
        @keyframes floatHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .bg-heart {
            position: absolute;
            color: var(--heart-color);
            opacity: 0;
            pointer-events: none;
        }

        #open-trigger:checked ~ .bg-hearts .bg-heart {
            opacity: 0.6;
            animation: floatHeart 4s linear infinite;
        }

    </style>
</head>
<body>

    <div class="backdrop"></div>

    <input type="checkbox" id="open-trigger">
    
    <label for="open-trigger" class="envelope-wrapper">
        <div class="flap"></div>
        <div class="envelope">
            <div style="position: absolute; bottom: 0; left: 0; width: 0; height: 0; border-left: 160px solid #ffcad5; border-top: 110px solid transparent; z-index: 4;"></div>
            <div style="position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-right: 160px solid #ffcada; border-top: 110px solid transparent; z-index: 4;"></div>
        </div>
        
        <div class="letter">
            <div class="letter-content">
                <h2>إلى أحدهم.. ❤️</h2>
                <p>
                    بصراحة، ملقيتش طريقة "Creative" تليق بيك <br>
                    أكتر من إني أصمم لك الصفحة دي <br>
                    عشان أقولك.. إني بحبك جداً!
                </p>
            </div>
        </div>
    </label>

    <div class="bg-hearts">
        <span class="bg-heart" style="left: 10%; font-size: 20px; animation-delay: 0s;">❤️</span>
        <span class="bg-heart" style="left: 30%; font-size: 30px; animation-delay: 1s;">💖</span>
        <span class="bg-heart" style="left: 70%; font-size: 25px; animation-delay: 2s;">💗</span>
        <span class="bg-heart" style="left: 90%; font-size: 15px; animation-delay: 1.5s;">❤️</span>
    </div>

</body>
</html>
